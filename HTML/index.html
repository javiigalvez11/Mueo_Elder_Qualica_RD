<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acceso al torno</title>

  <!-- Favicon -->
  <link rel="icon" href="/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <style>
    :root{
      --dark:#292734;
      --dark2:#1f1e28;
      --red:#eb3a3a;
      --red2:#ff3a2d;
      --bg:#fafafa;
      --card:#ffffff;
      --line:#e6e6ea;
      --muted:#6b6a75;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--dark);
      font-family:"Titillium Web", Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* ================= CABECERA GENERAL ================= */
    .site-header{
      background: linear-gradient(
        90deg,
        var(--dark) 0%,
        var(--dark2) 33%,
        var(--red) 66%,
        var(--red2) 100%
      );
      padding:22px 16px;
      display:flex;
      justify-content:center;
      align-items:center;
      border-bottom:1px solid var(--line);
    }

    .site-header img{
      height:52px;
      max-width:100%;
      object-fit:contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.25));
    }

    /* ================= CONTENIDO ================= */
    .page{
      min-height:calc(100vh - 96px);
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:32px 14px;
    }

    .card{
      width:100%;
      max-width:560px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      overflow:hidden;
    }

    /* ===== Cabecera del recuadro ===== */
    .card-header{
      background: linear-gradient(
        90deg,
        var(--dark) 0%,
        var(--dark2) 33%,
        var(--red) 66%,
        var(--red2) 100%
      );
      padding:16px 20px;
      color:#ffffff;
    }

    .card-header-text{
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }

    .card-header-text strong{
      font-size:18px;
      font-weight:900;
      letter-spacing:.3px;
    }

    .card-header-text span{
      font-size:13px;
      opacity:.85;
    }

    .card-body{
      padding:22px;
    }

    .msg{
      margin:0 0 14px 0;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#ffffff;
      font-size:14px;
    }

    label{
      display:block;
      margin:10px 0 6px 0;
      font-weight:800;
      font-size:14px;
    }

    input[type="password"]{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
      outline:none;
      font-size:14px;
      transition:border-color .15s, box-shadow .15s;
    }

    input[type="password"]:focus{
      border-color:rgba(235,58,58,.8);
      box-shadow:0 0 0 4px rgba(235,58,58,.12);
    }

    .actions{
      margin-top:16px;
    }

    input[type="submit"]{
      border:none;
      border-radius:10px;
      padding:12px 16px;
      font-weight:900;
      letter-spacing:.3px;
      cursor:pointer;
      color:#ffffff;
      width:100%;
      background:
        linear-gradient(to right,var(--red2) 50%,var(--dark) 50%)
        no-repeat right bottom / 210% 100%;
      transition:background-position .25s ease, transform .06s ease;
    }

    input[type="submit"]:hover{
      background-position:left bottom;
    }

    input[type="submit"]:active{
      transform:translateY(1px);
    }

    .hint{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
    }

    @media (max-width:720px){
      .site-header img{ height:44px; }
      .card-body{ padding:18px; }
    }
  </style>
</head>

<body>

  <!-- CABECERA GENERAL -->
  <header class="site-header">
    <img src="/qualicard.png" alt="Qualica-RD">
  </header>

  <!-- CONTENIDO -->
  <div class="page">
    <div class="card">

      <div class="card-header">
        <div class="card-header-text">
          <strong>Acceso al torno</strong>
          <span>Panel de administración</span>
        </div>
      </div>

      <div class="card-body">

        <div class="msg">pError</div>

        <form action="/submit" method="POST">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required />
          <div class="actions">
            <input type="submit" value="Acceder" />
          </div>
        </form>

        <div class="hint">
          Introduce la credencial maestra para acceder al menú.
        </div>

      </div>
    </div>
  </div>

</body>
</html>
