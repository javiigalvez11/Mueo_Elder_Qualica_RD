<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menú Principal</title>

  <link rel="icon" href="/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  
  <style>
    :root{
      --dark:#292734;
      --dark2:#1f1e28;
      --red:#eb3a3a;
      --red2:#ff3a2d;
      --bg:#fafafa;
      --card:#ffffff;
      --line:#e6e6ea;
      --muted:#6b6a75;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--dark);
      font-family:"Titillium Web", Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
    }

    /* ================= CABECERA GENERAL ================= */
    .site-header{
      background: linear-gradient(
        90deg,
        var(--dark) 0%,
        var(--dark2) 33%,
        var(--red) 66%,
        var(--red2) 100%
      );
      padding:22px 16px;
      display:flex;
      justify-content:center;
      align-items:center;
      border-bottom:1px solid var(--line);
    }

    .site-header img{
      height:52px;
      max-width:100%;
      object-fit:contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.25));
    }

    /* ================= CONTENIDO ================= */
    .page{
      min-height:calc(100vh - 96px); /* altura cabecera */
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:28px 14px;
    }

    .card{
      width:100%;
      max-width:720px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      overflow:hidden;
    }

    /* Cabecera del recuadro */
    .card-header{
      background: linear-gradient(
        90deg,
        var(--dark) 0%,
        var(--dark2) 33%,
        var(--red) 66%,
        var(--red2) 100%
      );
      padding:18px;
      color:#ffffff;
    }

    .card-header h2{
      margin:0;
      font-size:20px;
      font-weight:900;
      letter-spacing:.3px;
    }

    .card-body{
      padding:18px;
    }

    p{
      margin:8px 0 16px 0;
      color:var(--muted);
    }

    ul{
      list-style:none;
      padding:0;
      margin:0;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    a{
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      border-radius:12px;
      padding:14px;
      font-weight:900;
      letter-spacing:.2px;
      border:1px solid var(--line);
      background:#ffffff;
      color:var(--dark);
      box-shadow:0 2px 10px rgba(0,0,0,.05);
      transition:
        transform .08s ease,
        box-shadow .15s ease,
        border-color .15s ease;
      min-height:52px;
      text-align:center;
    }

    a:hover{
      transform:translateY(-1px);
      border-color:rgba(41,39,52,.35);
      box-shadow:0 10px 20px rgba(0,0,0,.08);
    }

    a:active{
      transform:translateY(0);
    }

    /* Botón logout */
    .logout{
      margin-top:14px;
      width:100%;
      color:#ffffff;
      border:none;
      background:
        linear-gradient(to right,var(--red2) 50%,var(--dark) 50%)
        no-repeat right bottom / 210% 100%;
      transition:background-position .25s ease, transform .06s ease;
      box-shadow:none;
    }

    .logout:hover{
      background-position:left bottom;
    }

    .logout:active{
      transform:translateY(1px);
    }

    @media (max-width:720px){
      .page{ padding:18px 10px; }
      .card-body{ padding:14px; }
      .card-header h2{ font-size:18px; }
      ul{ grid-template-columns:1fr; }
      .site-header img{ height:44px; }
    }
  </style>

  <script>
    const INACTIVITY_TIMEOUT_MS = 300000; // 5 minutos
    let timeoutId;

    function resetTimer(){
      clearTimeout(timeoutId);
      timeoutId = setTimeout(() => {
        window.location.href = "/logout";
      }, INACTIVITY_TIMEOUT_MS);
    }

    const events = ['mousemove','keypress','click','scroll','touchstart','keydown'];
    events.forEach(e => document.addEventListener(e, resetTimer, false));

    window.onload = resetTimer;

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) clearTimeout(timeoutId);
      else resetTimer();
    });
  </script>
</head>

<body>

  <!-- CABECERA GENERAL -->
  <header class="site-header">
    <img src="/qualicard.png" alt="Qualica-RD">
  </header>

  <!-- CONTENIDO -->
  <div class="page">
    <div class="card">

      <div class="card-header">
        <h2>Menú principal</h2>
      </div>

      <div class="card-body">
        <p>Elige una opción:</p>

        <ul>
          <li><a href="/config">Configuración del torno</a></li>
          <li><a href="/upload_firmware">Actualizar firmware</a></li>
          <li><a href="/upload_fs">Actualizar sistema de ficheros</a></li>
          <li><a href="/logs">Ver logs</a></li>
          <li><a href="/reiniciar">Reiniciar dispositivo</a></li>
        </ul>

        <a class="logout" href="/logout">Cerrar sesión</a>
      </div>

    </div>
  </div>

</body>
</html>
