<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reiniciar dispositivo</title>

    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <style>
        :root {
            --dark: #292734;
            --dark2: #1f1e28;
            --red: #eb3a3a;
            --red2: #ff3a2d;
            --bg: #fafafa;
            --card: #fff;
            --line: #e6e6ea;
            --muted: #6b6a75;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--dark);
            font-family: "Titillium Web", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ================= CABECERA GENERAL ================= */
        .site-header {
            background: linear-gradient(90deg, var(--dark) 0%, var(--dark2) 33%, var(--red) 66%, var(--red2) 100%);
            padding: 22px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--line);
        }

        .site-header img {
            height: 52px;
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, .25));
        }

        .page {
            min-height: calc(100vh - 96px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 28px 14px;
        }

        .card {
            width: 100%;
            max-width: 720px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(90deg, var(--dark) 0%, var(--dark2) 33%, var(--red) 66%, var(--red2) 100%);
            padding: 18px;
            color: #fff;
        }

        .card-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 900;
        }

        .card-body {
            padding: 18px;
        }

        p {
            margin: 10px 0 14px 0;
            color: var(--muted);
            line-height: 1.45;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        button,
        a.btn {
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            font-weight: 900;
            letter-spacing: .3px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        button.reboot {
            color: #fff;
            background: linear-gradient(90deg, var(--red2) 0%, var(--red) 60%, #b81818 100%);
            transition: transform .06s ease, box-shadow .15s ease;
        }

        button.reboot:hover {
            box-shadow: 0 0 0 4px rgba(235, 58, 58, .12);
        }

        button.reboot:active {
            transform: translateY(1px);
        }

        a.btn {
            color: var(--dark);
            background: #fff;
            border: 1px solid var(--line);
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        a.btn:hover {
            border-color: rgba(41, 39, 52, .35);
            box-shadow: 0 0 0 4px rgba(41, 39, 52, .08);
        }

        @media (max-width:720px) {
            .page {
                padding: 18px 10px;
            }

            .card-body {
                padding: 14px;
            }

            .card-header h2 {
                font-size: 18px;
            }

            .site-header img {
                height: 44px;
            }
        }
    </style>

    <script>
        const INACTIVITY_TIMEOUT_MS = 300000; // 5 minutos
        let timeoutId;

        function resetTimer() {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(() => window.location.href = "/logout", INACTIVITY_TIMEOUT_MS);
        }

        const events = ['mousemove', 'keypress', 'click', 'scroll', 'touchstart', 'keydown'];
        events.forEach(ev => document.addEventListener(ev, resetTimer, false));
        window.onload = resetTimer;
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) clearTimeout(timeoutId);
            else resetTimer();
        });

        function confirmAndReboot() {
            if (confirm("¿Estás seguro de que quieres reiniciar el dispositivo? Esto puede tardar unos segundos.")) {
                fetch('/reiniciar_dispositivo', { method: 'POST' })
                    .then(r => r.ok ? alert('Reiniciando. Recarga la página en unos segundos.') : alert('Error al intentar reiniciar.'))
                    .catch(() => alert('Error de conexión al intentar reiniciar.'));
            }
        }
    </script>
</head>

<body>
    <header class="site-header">
        <img src="/qualicard.png" alt="Qualica-RD">
    </header>

    <div class="page">
        <div class="card">
            <div class="card-header">
                <h2>Reiniciar dispositivo</h2>
            </div>
            <div class="card-body">
                <p>Haz clic en el botón para reiniciar el ESP32. Útil para aplicar cambios o resolver incidencias.</p>
                <div class="actions">
                    <button class="reboot" type="button" onclick="confirmAndReboot()">Reiniciar ahora</button>
                    <a class="btn" href="/menu">Volver al menú</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
