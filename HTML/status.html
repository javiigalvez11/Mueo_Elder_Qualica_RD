<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>

  <!-- Favicon -->
  <link rel="icon" href="/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <style>
    :root{
      --dark:#292734;
      --dark2:#1f1e28;
      --red:#eb3a3a;
      --red2:#ff3a2d;
      --bg:#fafafa;
      --card:#ffffff;
      --line:#e6e6ea;
      --muted:#6b6a75;
      --ok:#2ea44f;
      --ok2:#1e6f33;
      --info:#3b82f6;
      --info2:#1d4ed8;
      --err:#eb3a3a;
      --err2:#9b1c1c;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--dark);
      font-family:"Titillium Web", Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* ================= CABECERA GENERAL ================= */
    .site-header{
      background: linear-gradient(
        90deg,
        var(--dark) 0%,
        var(--dark2) 33%,
        var(--red) 66%,
        var(--red2) 100%
      );
      padding:22px 16px;
      display:flex;
      justify-content:center;
      align-items:center;
      border-bottom:1px solid var(--line);
    }

    .site-header img{
      height:52px;
      max-width:100%;
      object-fit:contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.25));
    }

    /* ================= CONTENIDO ================= */
    .page{
      min-height:calc(100vh - 96px);
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:28px 14px;
    }

    .card{
      width:100%;
      max-width:720px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      overflow:hidden;
    }

    .card-header{
      background: linear-gradient(
        90deg,
        var(--dark) 0%,
        var(--dark2) 33%,
        var(--red) 66%,
        var(--red2) 100%
      );
      padding:18px;
      color:#ffffff;
    }

    .card-header h2{
      margin:0;
      font-size:20px;
      font-weight:900;
      letter-spacing:.3px;
    }

    .card-body{
      padding:18px;
    }

    /* Badge */
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#f2f2f6;
      font-weight:900;
      font-size:12px;
      letter-spacing:.2px;
      text-transform:uppercase;
      margin-bottom:12px;
      user-select:none;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
    }

    /* Variantes por tipo */
    .badge.success{
      border-color: rgba(46,164,79,.35);
      background: rgba(46,164,79,.08);
      color: var(--ok2);
    }
    .badge.success .dot{ background: var(--ok); }

    .badge.info{
      border-color: rgba(59,130,246,.35);
      background: rgba(59,130,246,.08);
      color: var(--info2);
    }
    .badge.info .dot{ background: var(--info); }

    .badge.error{
      border-color: rgba(235,58,58,.35);
      background: rgba(235,58,58,.08);
      color: var(--err2);
    }
    .badge.error .dot{ background: var(--err); }

    .msg{
      margin:0 0 14px 0;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#ffffff;
      font-size:14px;
      line-height:1.45;
      word-break:break-word;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    /* Botón principal (volver) */
    a.btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      border-radius:10px;
      padding:12px 16px;
      font-weight:900;
      letter-spacing:.3px;
      text-decoration:none;
      border:1px solid var(--line);
      color:var(--dark);
      background:#ffffff;
      transition:border-color .15s ease, box-shadow .15s ease;
    }

    a.btn:hover{
      border-color:rgba(41,39,52,.35);
      box-shadow:0 0 0 4px rgba(41,39,52,.08);
    }

    .hint{
      margin-top:12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }

    @media (max-width:720px){
      .page{ padding:18px 10px; }
      .card-body{ padding:14px; }
      .card-header h2{ font-size:18px; }
      .site-header img{ height:44px; }
    }
  </style>

  <script>
    (function(){
      var url = "{{AUTO_REDIRECT_URL}}";
      var ms  = parseInt("{{AUTO_REDIRECT_MS}}", 10);

      if (url && url !== "0" && !isNaN(ms) && ms > 0) {
        setTimeout(function(){ window.location.href = url; }, ms);
      }
    })();
  </script>
</head>

<body>

  <!-- CABECERA GENERAL -->
  <header class="site-header">
    <img src="/qualicard.png" alt="Qualica-RD">
  </header>

  <!-- CONTENIDO -->
  <div class="page">
    <div class="card">

      <div class="card-header">
        <h2>{{TITLE}}</h2>
      </div>

      <div class="card-body">

        <!-- kind: success | error | info -->
        <div class="badge {{KIND}}">
          <span class="dot"></span>
          <span>{{KIND}}</span>
        </div>

        <div class="msg">{{MESSAGE}}</div>

        <div class="actions">
          <a class="btn" href="{{BACK_URL}}">{{BACK_TEXT}}</a>
        </div>

        <div class="hint">{{REDIRECT_HINT}}</div>

      </div>
    </div>
  </div>

</body>
</html>
