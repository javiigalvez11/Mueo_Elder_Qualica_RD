<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cargar Firmware ESP32</title>

  <link rel="icon" href="/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <style>
    :root {
      --dark: #292734;
      --dark2: #1f1e28;
      --red: #eb3a3a;
      --red2: #ff3a2d;
      --bg: #fafafa;
      --card: #fff;
      --line: #e6e6ea;
      --muted: #6b6a75;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--dark);
      font-family: "Titillium Web", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ================= CABECERA GENERAL ================= */
    .site-header {
      background: linear-gradient(90deg, var(--dark) 0%, var(--dark2) 33%, var(--red) 66%, var(--red2) 100%);
      padding: 22px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .site-header img {
      height: 52px;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, .25));
    }

    .page {
      min-height: calc(100vh - 96px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 28px 14px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(90deg, var(--dark) 0%, var(--dark2) 33%, var(--red) 66%, var(--red2) 100%);
      padding: 18px;
      color: #fff;
    }

    .card-header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
    }

    .card-body {
      padding: 18px;
    }

    p {
      margin: 10px 0 12px 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f2f2f6;
      color: var(--dark);
      font-weight: 900;
      font-size: 13px;
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn,
    input[type="submit"] {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 900;
      letter-spacing: .3px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    input[type="submit"] {
      color: #fff;
      background: linear-gradient(to right, var(--red2) 50%, var(--dark) 50%) no-repeat right bottom / 210% 100%;
      transition: background-position .25s ease, transform .06s ease;
    }

    input[type="submit"]:hover {
      background-position: left bottom;
    }

    input[type="submit"]:active {
      transform: translateY(1px);
    }

    .btn {
      color: var(--dark);
      background: #fff;
      border: 1px solid var(--line);
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .btn:hover {
      border-color: rgba(41, 39, 52, .35);
      box-shadow: 0 0 0 4px rgba(41, 39, 52, .08);
    }

    .btn-danger {
      color: #fff;
      border: none;
      background: linear-gradient(90deg, var(--red2) 0%, var(--red) 60%, #b81818 100%);
    }

    .btn-danger:hover {
      box-shadow: 0 0 0 4px rgba(235, 58, 58, .12);
    }

    @media (max-width:720px) {
      .page {
        padding: 18px 10px;
      }

      .card-body {
        padding: 14px;
      }

      .card-header h2 {
        font-size: 18px;
      }

      .site-header img {
        height: 44px;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <img src="/qualicard.png" alt="Qualica-RD">
  </header>

  <div class="page">
    <div class="card">
      <div class="card-header">
        <h2>Actualizar firmware</h2>
      </div>

      <div class="card-body">
        <p>Versión actual del firmware: <span class="pill">VERSION_FIRMWARE</span></p>
        <p>Seleccione el archivo binario para actualizar el firmware.</p>

        <form method="POST" action="/upload_firmware" enctype="multipart/form-data">
          <input type="file" name="firmware" required />
          <div class="actions">
            <input type="submit" value="Actualizar firmware" />
            <button class="btn btn-danger" type="button" onclick="
              fetch('/download_firmware')
                .then(response => {
                  if (response.ok) alert('Descarga iniciada, el dispositivo se reiniciará en breve.');
                  else response.text().then(text => alert('Error al iniciar descarga: ' + text));
                })
                .catch(error => alert('Error de comunicación: ' + error));
            ">Descargar firmware desde servidor</button>
            <a class="btn" href="/menu">Volver al menú</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
